name: CI

on:
  push:
    branches: ["ai-agent"]
  pull_request:
    branches: ["ai-agent"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: contact.test_settings
      SECRET_KEY: django-insecure-ci-secret-key-not-for-production
      DEBUG: "True"
      DB_ENGINE: django.db.backends.sqlite3
      OPENAI_API_KEY: sk-test-dummy-key-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (SQLite in-memory)
        run: python manage.py migrate --settings=contact.test_settings

      - name: Run test 
        run: |
            python manage.py test

      - name: push image to docker hub 
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: mahdisahami/phonebook:latest
          with:
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}