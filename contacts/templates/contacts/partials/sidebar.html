{% load contacts_ui %}
<aside class="sidebar glass-card">
    <div class="brand">
        <div class="brand-logo">C</div>
        <div>
            <h1>{{ portfolio_brand_name }}</h1>
            <p>{{ portfolio_tagline }}</p>
        </div>
    </div>

    <nav class="nav">
        <a href="{% url 'contacts:dashboard' %}" class="nav-link {% active_class request 'dashboard' %}">
            Dashboard
        </a>
        <a href="{% url 'contacts:create' %}" class="nav-link {% active_class request 'create' %}">
            New Contact
        </a>
        <a href="{% url 'ai_agent:chat_page' %}" class="nav-link nav-link-ai">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round"
                 stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            AI Assistant
        </a>
    </nav>

    <form method="post" action="{% url 'contacts:logout' %}" class="logout-form">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger btn-block">Logout</button>
    </form>
</aside>
